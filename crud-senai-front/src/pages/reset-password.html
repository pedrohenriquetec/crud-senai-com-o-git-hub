<!doctype html> 
<html lang="pt-br"> 
<head> 
  <meta charset="utf-8" /> 
  <meta name="viewport" content="width=device-width,initial-scale=1" /> 
  <title>Redefinir Senha</title> 
  <link rel="stylesheet" href="../assets/css/styles.css" /> 
</head> 
<body> 
  <div class="container"> 
    <div class="card" style="max-width:520px;margin:40px auto;"> 
      <h1> Redefinição de Senha</h1> 
      <p class="small"> 
        Informe o token de redefinição recebido e escolha uma nova senha. 
      </p> 
 
      <form id="resetPasswordForm"> 
        <label for="token">Token</label> 
        <input 
          id="token" 
          type="text" 
          placeholder="Cole aqui o token de redefinição" 
          required 
        /> 
 
        <label for="newPassword">Nova Senha</label> 
        <input 
          id="newPassword" 
          type="password" 
          placeholder="Digite a nova senha" 
          required 
        /> 
 
        <div class="row" style="margin-top:14px;"> 
          <button class="btn-primary" type="submit">Redefinir senha</button> 
          <a class="btn-ghost" href="./login.html" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;"> 
            Voltar ao login 
          </a> 
        </div> 
 
        <div id="alertReset" class="alert" hidden></div> 
      </form> 
    </div> 
  </div> 
 
  <script type="module"> 
    import { initResetPasswordPage } from "../assets/js/reset-password.js"; 
    initResetPasswordPage(); 
  </script> 
</body> 
</html>
